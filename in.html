<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
</head>
<body>

    <h1>Gallery</h1>

    <form method="POST">

        <input type="text" name="url" placeholder="Image URL">
        <button type="submit">Add</button>

    </form>

    <hr>

    {% for img in images %}

        <img src="{{ img }}" width="200">
        <br>

        <a href="/delete/{{ loop.index0 }}">Delete</a>

        <hr>

    {% endfor %}

</body>
</html>
